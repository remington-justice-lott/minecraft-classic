<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Minecraft Scratch - PC Beta Edition</title>
    <style>
        /* */
        body { margin: 0; overflow: hidden; background-color: #78a7ff; font-family: sans-serif; user-select: none; -webkit-user-select: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        /* CLASSIC TITLE SCREEN SYSTEM WITH TILING DIRT TEXTURE */
        #main-menu {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #2c1e14;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                linear-gradient(45deg, #241810 25%, transparent 25%, transparent 75%, #241810 75%, #241810),
                linear-gradient(45deg, #241810 25%, transparent 25%, transparent 75%, #241810 75%, #241810);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            background-position: 0 0, 0 0, 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        #menu-title-wrap { position: relative; margin-bottom: 35px; text-align: center; }
        #menu-title { 
            font-size: 72px; font-weight: 900; color: #bcbcbc; 
            font-family: 'Arial Black', Impact, sans-serif;
            letter-spacing: -2px;
            text-shadow: 
                1px 1px 0px #888, 2px 2px 0px #888, 3px 3px 0px #777,
                4px 4px 0px #555, 5px 5px 0px #444, 6px 6px 0px #333,
                7px 7px 8px rgba(0,0,0,0.9);
        }
        #splash-text {
            position: absolute; right: -40px; bottom: -15px; color: #ffff55; font-weight: bold; font-size: 24px;
            font-family: 'Courier New', monospace; transform: rotate(-20deg); 
            text-shadow: 3px 3px #3f3f00; animation: splashPulse 0.4s infinite alternate;
        }
        @keyframes splashPulse { 0% { transform: rotate(-20deg) scale(0.95); } 100% { transform: rotate(-20deg) scale(1.05); } }
        
        .menu-btn {
            appearance: none; -webkit-appearance: none; outline: none;
            display: block; width: 400px; padding: 12px; margin: 5px 0; background: #7c7c7c; border: 3px solid #000;
            border-top-color: #afafaf; border-left-color: #afafaf; color: #e0e0e0; font-size: 16px; 
            text-align: center; cursor: pointer; text-shadow: 2px 2px #222; font-family: monospace;
            box-sizing: border-box;
        }
        .menu-btn:hover { background: #8c8c8c; color: #fff; border-top-color: #bfffff; border-left-color: #bfffff; }
        .btn-spacer { height: 18px; }
        
        #copyright { position: absolute; bottom: 8px; right: 12px; color: #bfbfbf; font-size: 13px; font-family: monospace; text-shadow: 1px 1px #000; }

        #options-screen, #mp-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20000;
        }

        #crosshair { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255, 255, 255, 0.7); font-size: 26px; pointer-events: none; z-index: 15000; font-family: monospace; }
        #inv-toggle-btn { display: none; position: absolute; top: 15px; right: 15px; background: #666; border: 2px solid #000; color: white; padding: 10px 16px; font-weight: bold; border-radius: 4px; z-index: 15000; cursor: pointer; }
        #gamemode-btn { display: none; position: absolute; top: 15px; left: 15px; background: #bc7c24; border: 2px solid #000; color: white; padding: 10px 16px; font-weight: bold; border-radius: 4px; z-index: 15000; cursor: pointer; }
        #save-btn { display: none; position: absolute; top: 65px; left: 15px; background: #2d872d; border: 2px solid #000; color: white; padding: 10px 16px; font-weight: bold; border-radius: 4px; z-index: 15000; cursor: pointer; }
        
        /* */
        /* 10 Hearts HUD System centered directly above Hotbar */
        #hud-container {
            display: none; position: absolute; bottom: 58px; left: 50%; transform: translateX(-50%);
            flex-direction: column; align-items: center; gap: 4px; z-index: 15000; pointer-events: none;
        }
        #hearts-row { display: flex; gap: 2px; }
        #bubbles-row { display: none; gap: 2px; margin-bottom: 2px; }
        .heart { font-size: 20px; font-family: monospace; text-shadow: 2px 2px #000; line-height: 1; }
        .bubble { font-size: 20px; font-family: monospace; text-shadow: 2px 2px #000; line-height: 1; color: #3b5ec2; }
        #hunger-status { color: #fff; font-family: monospace; font-size: 14px; text-shadow: 2px 2px #000; background: rgba(0,0,0,0.4); padding: 2px 10px; border-radius: 3px; }

        /* CLEAN MINECRAFT HOTBAR */
        #hotbar-container {
            display: none; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            background: #4a4a4a; border: 4px solid #1c1c1c; gap: 2px; z-index: 15000; padding: 2px;
        }
        .slot {
            width: 44px; height: 44px; background: #8b8b8b; border: 2px solid #373737;
            box-sizing: border-box; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .slot-icon { width: 32px; height: 32px; image-rendering: pixelated; }
        .slot.selected { border: 4px solid #ffffff; background: #afafaf; }

        /* INVENTORY OVERLAY */
        #inventory-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.6); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 30000;
        }
        .inv-box {
            background: #c6c6c6; border: 4px solid #555; border-top-color: #fff; border-left-color: #fff;
            padding: 16px; display: flex; flex-direction: column; gap: 12px; box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }
        .inv-title { font-weight: bold; color: #333; font-size: 16px; margin-bottom: 4px; font-family: monospace; }
        .inv-grid { display: grid; grid-template-columns: repeat(4, 52px); gap: 6px; }
        .inv-item {
            width: 52px; height: 52px; background: #8b8b8b; border: 3px solid #373737;
            border-top-color: #fff; border-left-color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .inv-item:hover { background: #afafaf; }

        /* */
        /* YOU DIED SCREEN */
        #death-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(120, 0, 0, 0.85); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 40000;
        }
        #death-title {
            font-size: 72px; font-weight: 900; color: #ff5555;
            font-family: 'Arial Black', Impact, sans-serif;
            text-shadow: 4px 4px 0px #000;
            margin-bottom: 20px;
        }
        #death-score {
            color: #ffffff; font-size: 24px; font-family: monospace;
            text-shadow: 2px 2px #000; margin-bottom: 40px;
        }

        /* Notifier styled overlay */
        #ui-notifier {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); border: 2px solid #555; color: #fff;
            padding: 8px 18px; font-family: monospace; font-size: 14px; border-radius: 4px;
            z-index: 50000; display: none; pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-notifier">Notification</div>

    <div id="main-menu">
        <div id="menu-title-wrap">
            <div id="menu-title">MINECRAFT</div>
            <div id="splash-text">BETA PC UPDATE!</div>
        </div>
        <button class="menu-btn" id="btn-singleplayer">Singleplayer</button>
        <button class="menu-btn" id="btn-multiplayer">Multiplayer (LAN)</button>
        <button class="menu-btn" id="btn-tutorial">Play tutorial level</button>
        <div class="btn-spacer"></div>
        <button class="menu-btn" id="btn-options">Options...</button>
        <div id="copyright">Copyright Mojang Specifications. Do not distribute.</div>
    </div>

    <div id="options-screen">
        <div class="inv-box" style="width: 420px; align-items: center;">
            <div class="inv-title" style="font-size: 20px; margin-bottom: 15px;">Options</div>
            <button class="menu-btn" id="opt-render" style="width: 100%;">Render Distance: Normal (10)</button>
            <button class="menu-btn" id="opt-fov" style="width: 100%;">FOV: Normal (75)</button>
            <div class="btn-spacer"></div>
            <button class="menu-btn" id="opt-done" style="width: 100%; background: #5c5c5c;">Done</button>
        </div>
    </div>

    <div id="mp-screen">
        <div class="inv-box" style="width: 420px; align-items: center;">
            <div class="inv-title" style="font-size: 20px; margin-bottom: 15px;">Local LAN Connection</div>
            <input type="text" id="mp-ip" value="192.168.1.50" style="width:90%; padding:10px; font-family:monospace; margin-bottom:10px; text-align:center;">
            <button class="menu-btn" id="btn-mp-host" style="width: 100%; background:#2d872d;">Host LAN Server</button>
            <button class="menu-btn" id="btn-mp-join" style="width: 100%;">Join Local IP</button>
            <div class="btn-spacer"></div>
            <button class="menu-btn" id="mp-close" style="width: 100%; background: #5c5c5c;">Cancel</button>
        </div>
    </div>

    <div id="crosshair">+</div>
    <button id="gamemode-btn">SURVIVAL</button>
    <button id="save-btn">SAVE WORLD</button>
    <button id="inv-toggle-btn">INVENTORY (E)</button>
    
    <div id="hud-container">
        <div id="bubbles-row"></div>
        <div id="hearts-row"></div>
        <div id="hunger-status">Hunger: 20/20</div>
    </div>

    <div id="hotbar-container">
        <div class="slot selected" id="s0"></div>
        <div class="slot" id="s1"></div>
        <div class="slot" id="s2"></div>
        <div class="slot" id="s3"></div>
        <div class="slot" id="s4"></div>
        <div class="slot" id="s5"></div>
        <div class="slot" id="s6"></div>
        <div class="slot" id="s7"></div>
        <div class="slot" id="s8"></div>
    </div>

    <div id="inventory-screen">
        <div class="inv-box">
            <div class="inv-title">Select Item for Active Slot:</div>
            <div class="inv-grid" id="storage-grid"></div>
            <button class="menu-btn" style="width:auto; margin-top:10px; font-size:12px;" id="btn-close-inv">Back to Game</button>
        </div>
    </div>

    <!-- -->
    <div id="death-screen">
        <div id="death-title">You died!</div>
        <div id="death-score">Score: 0</div>
        <button class="menu-btn" id="btn-respawn">Respawn</button>
        <button class="menu-btn" id="btn-mainmenu" style="background: #5c5c5c;">Title Screen</button>
    </div>

    <script>
        /* */
        window.addEventListener('contextmenu', e => e.preventDefault());

        let currentRenderDistance = 10;
        let currentFOV = 75;
        let isTutorialMode = false;
        let gameMode = "SURVIVAL"; 
        let health = 20, hunger = 20, hungerTimer = 0;
        let activeCrops = []; 
        let mobs = []; 
        let isMultiplayer = false, isHost = false;
        let isDead = false;

        // Drowning simulation metrics
        let bubbles = 10;
        let lastSubmergedCheckTime = 0;
        let lastDrownDamageTime = 0;

        // Survival inventory collections (Starts completely empty!)
        let playerInventory = {
            grass: 0, stone: 0, dirt: 0, wood: 0, leaves: 0,
            sand: 0, torch: 0, cobble: 0, crops: 0, stonebrick: 0,
            apple: 0, stick: 0
        };

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x78a7ff);

        const camera = new THREE.PerspectiveCamera(currentFOV, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 12, 8);
        let rot = { yaw: -0.7, pitch: -0.3 };
        camera.quaternion.setFromEuler(new THREE.Euler(rot.pitch, rot.yaw, 0, 'YXZ'));
        scene.add(camera);

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.85));
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.3);
        directionalLight.position.set(12, 24, 6);
        scene.add(directionalLight);

        // Music setup
        const music = new Audio('https://files.catbox.moe/k1y8a0.mp3');
        music.loop = true;

        const itemColors = {
            grass: '#55a038', stone: '#737373', dirt: '#866043', wood: '#9c7c53',
            leaves: '#337a22', sand: '#dfd29e', water: '#3b5ec2', torch: '#ffcc44', 
            cobble: '#616161', crops: '#a0cc44', stonebrick: '#525252',
            apple: '#ff3333', stick: '#8b5a2b'
        };
        const blockTypes = Object.keys(itemColors);
        
        // Blank starting layout
        let hotbarSlots = [null, null, null, null, null, null, null, null, null];
        let selectedHotbarIdx = 0;

        /* */
        function generateNoiseTexture(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            for (let x = 0; x < 16; x++) {
                for (let y = 0; y < 16; y++) {
                    let r, g, b;
                    let n = Math.random() * 26 - 13;
                    
                    if (type === 'grass') {
                        r = 85; g = 150; b = 50;
                        if (Math.random() > 0.75) n -= 20;
                    } else if (type === 'dirt') {
                        r = 115; g = 80; b = 50;
                        if ((x + y) % 4 === 0) n -= 18;
                    } else if (type === 'stone') {
                        r = 110; g = 110; b = 110;
                        if (Math.random() > 0.8) n -= 25;
                    } else if (type === 'wood') {
                        r = 140; g = 105; b = 65;
                        if (y % 4 === 0 || x === 0) { r -= 35; g -= 30; b -= 25; n = 0; }
                    } else if (type === 'sand') {
                        r = 215; g = 200; b = 145;
                        if ((x * y) % 7 === 0) n += 8;
                    } else if (type === 'cobble') {
                        r = 95; g = 95; b = 95;
                        if ((x + y) % 3 === 0 || x === 0 || y === 0) { r -= 20; g -= 20; b -= 20; }
                    } else if (type === 'leaves') {
                        r = 45; g = 115; b = 30;
                        if (Math.random() > 0.6) { r = 30; g = 85; b = 20; }
                    } else if (type === 'water') {
                        r = 40; g = 80; b = 200;
                        n = Math.sin(x * 0.6) * 12;
                    } else if (type === 'apple') {
                        r = 220; g = 30; b = 30;
                        if (x > 6 && x < 10 && y < 4) { r = 40; g = 100; b = 20; }
                    } else if (type === 'stick') {
                        r = 139; g = 90; b = 43;
                        if (x < 6 || x > 10) n -= 50;
                    } else {
                        r = 200; g = 200; b = 200;
                    }
                    
                    ctx.fillStyle = `rgb(${Math.min(255, Math.max(0, r + n))}, ${Math.min(255, Math.max(0, g + n))}, ${Math.min(255, Math.max(0, b + n))})`;
                    ctx.fillRect(x, y, 1, 1);
                }
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.magFilter = THREE.NearestFilter;
            tex.minFilter = THREE.NearestFilter;
            return tex;
        }

        const mats = {};
        blockTypes.forEach(t => {
            mats[t] = new THREE.MeshLambertMaterial({
                map: generateNoiseTexture(t), transparent: (t === 'water'), opacity: (t === 'water') ? 0.75 : 1.0
            });
        });

        function createZombieMesh() {
            const group = new THREE.Group();
            const headMat = new THREE.MeshLambertMaterial({ color: 0x3c703c }); 
            const shirtMat = new THREE.MeshLambertMaterial({ color: 0x00aaaa }); 
            const pantsMat = new THREE.MeshLambertMaterial({ color: 0x333399 }); 

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), headMat);
            head.position.y = 1.75; 
            group.add(head);

            const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.75, 0.25), shirtMat);
            body.position.y = 1.125;
            group.add(body);

            const legL = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.75, 0.25), pantsMat);
            legL.position.set(0.13, 0.375, 0);
            group.add(legL);

            const legR = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.75, 0.25), pantsMat);
            legR.position.set(-0.13, 0.375, 0);
            group.add(legR);

            const armL = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.75, 0.25), shirtMat);
            armL.position.set(0.375, 1.125, 0.25);
            armL.rotation.x = -Math.PI / 2;
            group.add(armL);

            const armR = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.75, 0.25), shirtMat);
            armR.position.set(-0.375, 1.125, 0.25);
            armR.rotation.x = -Math.PI / 2;
            group.add(armR);

            return group;
        }

        const playerArm = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.24, 0.75), new THREE.MeshLambertMaterial({ color: 0xd2a679 }));
        playerArm.position.set(0.45, -0.4, -0.65);
        playerArm.rotation.set(0.2, -0.3, 0);
        camera.add(playerArm);

        let swingTime = 0, isSwinging = false;
        function triggerArmSwing() { isSwinging = true; swingTime = 0; }
        function updateArmAnimation() {
            if (!isSwinging) return;
            swingTime += 0.25;
            playerArm.position.z = -0.65 + Math.sin(swingTime) * 0.15;
            playerArm.position.y = -0.4 - Math.abs(Math.sin(swingTime)) * 0.12;
            playerArm.rotation.x = 0.2 - Math.sin(swingTime) * 0.6;
            if (swingTime >= Math.PI) {
                isSwinging = false;
                playerArm.position.set(0.45, -0.4, -0.65);
                playerArm.rotation.set(0.2, -0.3, 0);
            }
        }

        const defaultGeo = new THREE.BoxGeometry(1, 1, 1);
        
        const activeWorldMap = new Map(); 
        const loadedColumns = new Map();
        let chunkGenerationQueue = [];

        let savedPlaced = {}, brokenSet = new Set();
        try { savedPlaced = JSON.parse(localStorage.getItem('mc_inf_placed')) || {}; } catch(e){}
        let savedBroken = [];
        try { savedBroken = JSON.parse(localStorage.getItem('mc_inf_broken')) || []; } catch(e){}
        if(Array.isArray(savedBroken)) brokenSet = new Set(savedBroken);

        function getTerrainHeight(x, z) { 
            if (isTutorialMode) return 4;
            return Math.floor(Math.sin(x * 0.12) * Math.cos(z * 0.12) * 3) + 4; 
        }

        function buildBlockMesh(x, y, z, type) {
            let geo = defaultGeo;
            if (type === 'crops') {
                geo = new THREE.BoxGeometry(1, 0.25, 1);
            }
            const m = new THREE.Mesh(geo, mats[type]);
            m.position.set(x, type === 'crops' ? y - 0.375 : y, z);
            m.userData = { type: type, key: `${x},${y},${z}` };
            scene.add(m);
            activeWorldMap.set(`${x},${y},${z}`, m);

            if (type === 'crops') {
                activeCrops.push({ key: `${x},${y},${z}`, age: 0, mesh: m });
            }
        }

        /* */
        function spawnRandomTree(x, baseHeight, z) {
            let treeType = Math.floor(Math.random() * 3); 
            let startY = baseHeight + 1;
            
            if (treeType === 0) {
                // Oakland standard tree style (4 logs, nested leaves)
                for (let ty = 0; ty < 4; ty++) {
                    const k = `${x},${startY + ty},${z}`;
                    if (!brokenSet.has(k) && !savedPlaced[k]) buildBlockMesh(x, startY + ty, z, 'wood');
                }
                for (let lx = -1; lx <= 1; lx++) {
                    for (let lz = -1; lz <= 1; lz++) {
                        for (let ly = 0; ly < 2; ly++) {
                            if (lx === 0 && lz === 0 && ly === 0) continue;
                            const lk = `${x + lx},${startY + 3 + ly},${z + lz}`;
                            if (!brokenSet.has(lk) && !savedPlaced[lk]) buildBlockMesh(x + lx, startY + 3 + ly, z + lz, 'leaves');
                        }
                    }
                }
                const capk = `${x},${startY + 5},${z}`;
                if (!brokenSet.has(capk) && !savedPlaced[capk]) buildBlockMesh(x, startY + 5, z, 'leaves');
            } else if (treeType === 1) {
                // Tall Spruce Pine variation (6 logs, layered leaves)
                for (let ty = 0; ty < 6; ty++) {
                    const k = `${x},${startY + ty},${z}`;
                    if (!brokenSet.has(k) && !savedPlaced[k]) buildBlockMesh(x, startY + ty, z, 'wood');
                }
                for (let lx = -2; lx <= 2; lx++) {
                    for (let lz = -2; lz <= 2; lz++) {
                        if (Math.abs(lx) === 2 && Math.abs(lz) === 2) continue;
                        if (lx === 0 && lz === 0) continue;
                        const lk = `${x + lx},${startY + 3},${z + lz}`;
                        if (!brokenSet.has(lk) && !savedPlaced[lk]) buildBlockMesh(x + lx, startY + 3, z + lz, 'leaves');
                    }
                }
                for (let lx = -1; lx <= 1; lx++) {
                    for (let lz = -1; lz <= 1; lz++) {
                        if (lx === 0 && lz === 0) continue;
                        const lk1 = `${x + lx},${startY + 4},${z + lz}`;
                        const lk2 = `${x + lx},${startY + 5},${z + lz}`;
                        if (!brokenSet.has(lk1) && !savedPlaced[lk1]) buildBlockMesh(x + lx, startY + 4, z + lz, 'leaves');
                        if (!brokenSet.has(lk2) && !savedPlaced[lk2]) buildBlockMesh(x + lx, startY + 5, z + lz, 'leaves');
                    }
                }
                const capk = `${x},${startY + 6},${z}`;
                if (!brokenSet.has(capk) && !savedPlaced[capk]) buildBlockMesh(x, startY + 6, z, 'leaves');
            } else {
                // Dense round birch style bush tree (3 logs, dense leaf pack)
                for (let ty = 0; ty < 3; ty++) {
                    const k = `${x},${startY + ty},${z}`;
                    if (!brokenSet.has(k) && !savedPlaced[k]) buildBlockMesh(x, startY + ty, z, 'wood');
                }
                for (let lx = -1; lx <= 1; lx++) {
                    for (let lz = -1; lz <= 1; lz++) {
                        for (let ly = 0; ly < 3; ly++) {
                            if (Math.abs(lx) === 1 && Math.abs(lz) === 1 && ly === 2) continue;
                            if (lx === 0 && lz === 0 && ly < 2) continue; 
                            const lk = `${x + lx},${startY + 2 + ly},${z + lz}`;
                            if (!brokenSet.has(lk) && !savedPlaced[lk]) buildBlockMesh(x + lx, startY + 2 + ly, z + lz, 'leaves');
                        }
                    }
                }
            }
        }

        function generateInstantSpawnZone(centerX, centerZ, radius) {
            for (let x = centerX - radius; x <= centerX + radius; x++) {
                for (let z = centerZ - radius; z <= centerZ + radius; z++) {
                    const colKey = `${x},${z}`;
                    if (!loadedColumns.has(colKey)) {
                        loadedColumns.set(colKey, 'loaded');
                        let baseHeight = getTerrainHeight(x, z);
                        let maxHeight = Math.max(baseHeight, 2);

                        for (let y = 0; y <= maxHeight; y++) {
                            const bKey = `${x},${y},${z}`;
                            if (brokenSet.has(bKey)) continue;
                            if (savedPlaced[bKey]) { buildBlockMesh(x, y, z, savedPlaced[bKey]); continue; }

                            if (y <= baseHeight) {
                                let bType = 'stone';
                                if (y === baseHeight) bType = (y <= 3) ? 'sand' : 'grass';
                                else if (y > baseHeight - 3) bType = (y <= 3) ? 'sand' : 'dirt';
                                buildBlockMesh(x, y, z, bType);
                            } else if (y <= 2) {
                                buildBlockMesh(x, y, z, 'water');
                            }
                        }
                        
                        // Seed trees directly into initial grass columns
                        if (!isTutorialMode && baseHeight > 3 && Math.abs(Math.sin(x * 5 + z * 13)) < 0.04) {
                            spawnRandomTree(x, baseHeight, z);
                        }
                    }
                }
            }
        }

        /* */
        function syncTerrainArea() {
            const pX = Math.floor(camera.position.x);
            const pZ = Math.floor(camera.position.z);
            const viewRadius = currentRenderDistance;
            const unloadRadius = viewRadius + 4;

            for (let x = pX - viewRadius; x <= pX + viewRadius; x++) {
                for (let z = pZ - viewRadius; z <= pZ + viewRadius; z++) {
                    const colKey = `${x},${z}`;
                    if (!loadedColumns.has(colKey)) {
                        loadedColumns.set(colKey, 'pending');
                        chunkGenerationQueue.push({x, z, colKey});
                    }
                }
            }

            for (let [colKey] of loadedColumns) {
                const [cx, cz] = colKey.split(',').map(Number);
                if (Math.abs(cx - pX) > unloadRadius || Math.abs(cz - pZ) > unloadRadius) {
                    loadedColumns.delete(colKey);
                    for (let [bKey, mesh] of activeWorldMap) {
                        const [bx, , bz] = bKey.split(',').map(Number);
                        if (bx === cx && bz === cz) { scene.remove(mesh); activeWorldMap.delete(bKey); }
                    }
                }
            }
        }

        function processGenerationQueue() {
            if (chunkGenerationQueue.length === 0) return;
            const steps = Math.min(chunkGenerationQueue.length, 15);
            for(let i=0; i<steps; i++) {
                const item = chunkGenerationQueue.shift();
                if (!loadedColumns.has(item.colKey) || loadedColumns.get(item.colKey) === 'loaded') continue;
                loadedColumns.set(item.colKey, 'loaded');

                let baseHeight = getTerrainHeight(item.x, item.z);
                let maxHeight = Math.max(baseHeight, 2);

                for (let y = 0; y <= maxHeight; y++) {
                    const bKey = `${item.x},${y},${item.z}`;
                    if (brokenSet.has(bKey)) continue;
                    if (savedPlaced[bKey]) { buildBlockMesh(item.x, y, item.z, savedPlaced[bKey]); continue; }

                    if (y <= baseHeight) {
                        let bType = 'stone';
                        if (y === baseHeight) bType = (y <= 3) ? 'sand' : 'grass';
                        else if (y > baseHeight - 3) bType = (y <= 3) ? 'sand' : 'dirt';
                        buildBlockMesh(item.x, y, item.z, bType);
                    } else if (y <= 2) {
                        buildBlockMesh(item.x, y, item.z, 'water');
                    }
                }

                // Random Trees Variety Generation
                if (!isTutorialMode && baseHeight > 3 && Math.abs(Math.sin(item.x * 5 + item.z * 13)) < 0.04) {
                    spawnRandomTree(item.x, baseHeight, item.z);
                }
            }
        }

        function testWallCollisions() {
            if (gameMode === "CREATIVE") return false;
            const meshes = Array.from(activeWorldMap.values());
            for (let i = 0; i < meshes.length; i++) {
                const b = meshes[i]; if (b.userData.type === 'water') continue;
                if (camera.position.y - PLAYER_HEIGHT < b.position.y + 0.5 && camera.position.y > b.position.y - 0.5) {
                    if (Math.abs(camera.position.x - b.position.x) < 0.76 && Math.abs(camera.position.z - b.position.z) < 0.76) return true;
                }
            }
            return false;
        }

        function updatePlayerSimulation() {
            if (!gameActive || invOpen || optScreen.style.display === 'flex') return;
            
            const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion); fwd.y = 0; fwd.normalize();
            const rgt = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion); rgt.y = 0; rgt.normalize();
            let moveVec = new THREE.Vector3();
            if (moves.fwd) moveVec.addScaledVector(fwd, speed); if (moves.bwd) moveVec.addScaledVector(fwd, -speed);
            if (moves.lft) moveVec.addScaledVector(rgt, -speed); if (moves.rgt) moveVec.addScaledVector(rgt, speed);

            camera.position.x += moveVec.x; if (testWallCollisions()) camera.position.x -= moveVec.x;
            camera.position.z += moveVec.z; if (testWallCollisions()) camera.position.z -= moveVec.z;

            if (gameMode === "SURVIVAL") {
                velocityY += GRAVITY; camera.position.y += velocityY; isGrounded = false;
                const meshes = Array.from(activeWorldMap.values());
                for (let i = 0; i < meshes.length; i++) {
                    const b = meshes[i]; if (b.userData.type === 'water') continue;
                    if (Math.abs(camera.position.x - b.position.x) < 0.55 && Math.abs(camera.position.z - b.position.z) < 0.55) {
                        const floorY = b.position.y + 0.5 + PLAYER_HEIGHT;
                        if (camera.position.y <= floorY && camera.position.y > floorY - 0.4 && velocityY <= 0) {
                            camera.position.y = floorY; velocityY = 0; isGrounded = true;
                        }
                    }
                }

            if (camera.position.y < -30) { camera.position.set(8, 12, 8); velocityY = 0; }
        }

            let submerged = (checkBlock && checkBlock.userData.type === 'water') || (camera.position.y <= 2.4 && getTerrainHeight(px, pz) <= 2);

            if (submerged && gameMode === "SURVIVAL" && gameActive) {
                document.getElementById('bubbles-row').style.display = 'flex';
                if (now - lastSubmergedCheckTime >= 1000) {
                    lastSubmergedCheckTime = now;
                    if (bubbles > 0) {
                        bubbles--;
                        drawBubblesHUD();
                    } else {
                        if (now - lastDrownDamageTime >= 1000) {

                            drawHeartsHUD();
                            if (health <= 0) {
                                triggerDeathScreen();
                            }
                        }
                    }
                }
            } else {
                if (bubbles < 10 && now - lastSubmergedCheckTime >= 150) {
                    lastSubmergedCheckTime = now;
                    bubbles++;
                    drawBubblesHUD();
                }
                if (bubbles === 10) {
                    document.getElementById('bubbles-row').style.display = 'none';

                let dirZ = camera.position.z - mob.mesh.position.z;
                let len = Math.sqrt(dirX*dirX + dirZ*dirZ);
                
                if (len < 5.0) {
                    if (len > 0.1) {
                        mob.mesh.rotation.y = Math.atan2(dirX, dirZ);
                    }
                    if (len > 0.8) {
                        mob.mesh.position.x += (dirX / len) * 0.035;
                        mob.mesh.position.z += (dirZ / len) * 0.035;
                        
                        let t = Date.now() * 0.005;
                        if(mob.mesh.children.length >= 4) {
                            mob.mesh.children[2].rotation.x = Math.sin(t) * 0.5; 
                            mob.mesh.children[3].rotation.x = Math.sin(t + Math.PI) * 0.5; 
                        }
                    } else {
                        if(mob.mesh.children.length >= 4) {
                            mob.mesh.children[2].rotation.x = 0;
                            mob.mesh.children[3].rotation.x = 0;
                        }
                    }
                } else {
                    if(mob.mesh.children.length >= 4) {
                        mob.mesh.children[2].rotation.x = 0;
                        mob.mesh.children[3].rotation.x = 0;
                    }
                }

                let mx = Math.round(mob.mesh.position.x);
                let mz = Math.round(mob.mesh.position.z);
                let my = Math.floor(mob.mesh.position.y);
                
                let highestY = getTerrainHeight(mx, mz);
                for(let checkY = my + 2; checkY >= -5; checkY--) {
                    let k = `${mx},${checkY},${mz}`;
                    if(activeWorldMap.has(k) && activeWorldMap.get(k).userData.type !== 'water') {
                        highestY = checkY;
                        break;
                    }
                }
                let groundY = highestY + 0.5;

                if (mob.mesh.position.y > groundY) {
                    mob.mesh.position.y += GRAVITY * 1.5;
                } else {
                    mob.mesh.position.y = groundY;
                }

                if (len < 1.0 && Math.abs(camera.position.y - mob.mesh.position.y) < 2.0 && gameMode === "SURVIVAL" && betaTickCount % 60 === 0) {
                    health -= 2; 
                    drawHeartsHUD();
                    if (health <= 0) {
                        triggerDeathScreen();
                    }
                }
            });
        }

        /* */
        let loopTick = 0;
        function animate() {
            requestAnimationFrame(animate);
            processGenerationQueue();
            updatePlayerSimulation();
            updateArmAnimation();
            updateBetaSystems();
            renderHighlightReticle();
            
            loopTick++;
            if (loopTick % 25 === 0 && !isTutorialMode) {
                syncTerrainArea();
            }
            
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
